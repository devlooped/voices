<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voces de X</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #111; color: #eee; }
    table { border-collapse: collapse; width: 100%; max-width: 900px; table-layout: fixed; }
    th, td { padding: 0.5rem; border-bottom: 1px solid #333; text-align: left; vertical-align: middle; }
    th:first-child, td:first-child { width: 3rem; }
    th:last-child, td:last-child { width: 360px; }
    audio { display: block; width: 100%; min-height: 40px; }
    a { color: #8cf; }
    .site-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .site-header .logo { width: 64px; height: 64px; flex-shrink: 0; }
    .site-header h1 { margin: 0; }
    .site-header p { margin: 0.25rem 0 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <img src="logo.jpg" alt="" class="logo">
    <div>
      <h1>Voces de X</h1>
      <p>Publicaciones y artículos seleccionados de la comunidad de X.</p>
    </div>
  </header>
  <table>
    <thead><tr><th>#</th><th>Title</th><th>Audio</th></tr></thead>
    <tbody id="episodes"></tbody>
  </table>

  <script id="podcast-data" type="application/json">
{
  "episodes": [
    {
      "md": "2026/06/4-es-hora-de-celebrar-a-elon-musk.md",
      "n": 4,
      "title": "Es hora de celebrar a Elon Musk",
      "mp3": "2026/06/4-es-hora-de-celebrar-a-elon-musk.mp3",
      "byline": "By Bill Ackman (@BillAckman)",
      "date": "2026-06-22"
    },
    {
      "md": "2026/06/3-por-que-los-medios-demonizan-a-elon-musk.md",
      "n": 3,
      "title": "Por qué Elon Musk es odiado y demonizado por los medios",
      "mp3": "2026/06/3-por-que-los-medios-demonizan-a-elon-musk.mp3",
      "byline": "By Brivael Le Pogam (@brivael)",
      "date": "2026-06-22"
    },
    {
      "md": "2026/04/2-esperanza-el-futuro-es-radiante.md",
      "n": 2,
      "title": "Esperanza: El futuro es radiante",
      "mp3": "2026/04/2-esperanza-el-futuro-es-radiante.mp3",
      "byline": "By Brivael Le Pogam (@brivael)",
      "date": "2026-04-03"
    },
    {
      "md": "2026/06/1-spacex-no-fue-una-opv-fue-un-referendum.md",
      "n": 1,
      "title": "SpaceX: No fue una OPV, fue un referéndum",
      "mp3": "2026/06/1-spacex-no-fue-una-opv-fue-un-referendum.mp3",
      "byline": "By Brivael Le Pogam (@brivael)",
      "date": "2026-06-17"
    }
  ],
  "title": "Voces de X",
  "description": "Publicaciones y artículos seleccionados de la comunidad de X."
}

  </script>

  <script>
    (function() {
      const dataEl = document.getElementById('podcast-data');
      const data = JSON.parse(dataEl.textContent);
      const tbody = document.getElementById('episodes');
      tbody.innerHTML = '';

      data.episodes.forEach(function(ep) {
        const tr = document.createElement('tr');

        const numTd = document.createElement('td');
        numTd.textContent = ep.n;
        tr.appendChild(numTd);

        const titleTd = document.createElement('td');
        const a = document.createElement('a');
        a.href = ep.md;
        a.textContent = ep.title;
        titleTd.appendChild(a);

        const br = document.createElement('br');
        titleTd.appendChild(br);

        const small = document.createElement('small');
        small.textContent = ep.date + ' — ' + ep.byline;
        titleTd.appendChild(small);

        tr.appendChild(titleTd);

        const audioTd = document.createElement('td');
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = ep.mp3;
        audioTd.appendChild(audio);
        tr.appendChild(audioTd);

        tbody.appendChild(tr);
      });
    })();
  </script>
</body>
</html>
